<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
</head>
    <body>
        <div id="container">
        <header>
            <img src="../img/index/logo.jpg" alt="Logo MeriendIA">
            <h1>Ingresa tu correo electrónico</h1>
        </header>
        <main>
            <p>Recupera tu contraseña</p>
            <div id="form">
                <form action="" method="get">
                    <label for="email">Correo</label><br/>
                    <input type="email" name="email" placeholder="ejemplo@correo.com" required><br/>
                    <button type="submit" onclick="recoverPassword()">RECUPERAR CONTRASEÑA</button>
                </form>
            </div>
        </main>
        <footer>
            <p>¿No tienes cuenta? <a href="../Register/Register.html">Registrarse</a></p>
            <p><a href="../index.html">Volver</a></p>
        </footer>
        </div>
        <script src="ForgottenPass.js"></script>
    </body>
</html>

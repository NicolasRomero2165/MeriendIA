<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeriendIA</title>
</head>
<body>
    <div id="container">
    <header>
        <img src="./img/index/logo.jpg" alt="Logo MeriendIA">
        <h1>Bienvenidos a MeriendIA</h1>
    </header>
    <main>
        <p>Ingresá a tu cuenta</p>
        <div id="form">
            <form action="" method="get">
                <label for="email" required>Correo</label><br/>
                <input type="email" name="email" id="email"><br/>
                <label for="password" required>Contraseña</label><br/>
                <input type="password" name="password" id="password"><br/>
                <button type="button" onclick="login()">INGRESAR</button>
            </form>
        </div>
    </main>
    <footer>
        <a href="./ForgottenPass/ForgottenPass.html">¿Olvidaste tu contraseña?</a>
        <p>¿No tienes cuenta? <a href="./Register/Register.html">Registrarse</a></p>
    </footer>
    </div>
    <script src="index.js"></script>
</body>
</html>

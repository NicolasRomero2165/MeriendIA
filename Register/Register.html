<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../index.css">
    <title>Registro</title>
</head>
<body>
    <div id="container">
    <header>
        <img src="../img/index/logo.jpg" alt="Logo MeriendIA">
        <h1>Crea tu cuenta</h1>
    </header>
    <main>
        <p>Unite a MeriendIA</p>
        <div id="form">
            <form action="" method="get">
                <label for="name">Nombre completo</label><br/>
                <input type="text" name="name" id="name" placeholder="Nombre Ejemplo" required><br/>
                <label for="email">Correo</label><br/>
                <input type="email" name="email" id="email" placeholder="ejemplo@correo.com" required><br/>
                <label for="number">Teléfono</label><br/>
                <input type="number" name="number" id="number" placeholder="+541112345678" required><br/>
                <label for="password">Contraseña</label><br/>
                <input type="password" name="password" id="password" placeholder="********" required><br/>
                <label for="password2">Repetir contraseña</label><br/>
                <input type="password" name="password2" id="password2" placeholder="********" required><br/>
                <button type="submit" onclick="newUser()">CREAR CUENTA</button>
            </form>
        </div>
    </main>
    <footer>
        <a href="../ForgottenPass/ForgottenPass.html">¿Olvidaste tu contraseña?</a>
        <p><a href="../index.html">Volver</a></p>
    </footer>
    </div>
    <script src='./Register.js'></script>
</body>
</html>
